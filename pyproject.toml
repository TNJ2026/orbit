[project]
name = "dev-loop"
version = "0.1.0"
description = "Local MCP server that lets LLM CLIs and agents exchange prompts with each other"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.9.0",
]

[project.scripts]
dev-loop = "dev_loop.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dev_loop"]
# The local Web UI ships as a non-Python resource loaded via
# importlib.resources at runtime; include it in built distributions.
force-include = { "src/dev_loop/static/ui.html" = "dev_loop/static/ui.html" }
