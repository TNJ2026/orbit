<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orbit Runtime</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/app.css">
</head>
<body>
  <a class="skip-link" href="#content" data-i18n="app.skipToContent">Skip to main content</a>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <div data-i18n="app.title">Orbit Runtime</div>
          <div class="brand-sub" data-i18n="app.subtitle">Mission control</div>
        </div>
      </div>
      <form class="search-slot" id="globalSearchForm" role="search">
        <label class="sr-only" for="globalSearch" data-i18n="search.label">Search runs</label>
        <input id="globalSearch" type="search" data-i18n-placeholder="search.placeholder" placeholder="Search goals and runs">
      </form>
      <nav class="nav" data-i18n-label="nav.label" aria-label="Main navigation">
        <div class="nav-group">
          <div class="nav-group-title" data-i18n="nav.group.workspace">Workspace</div>
          <button class="nav-button" data-view="home" aria-current="page">
            <span class="nav-icon" aria-hidden="true">⌂</span>
            <span data-i18n="nav.home">Workspace</span>
          </button>
          <button class="nav-button" data-view="workflows">
            <span class="nav-icon" aria-hidden="true">⌘</span>
            <span data-i18n="nav.workflows">Workflows</span>
          </button>
        </div>
        <div class="nav-group">
          <div class="nav-group-title" data-i18n="nav.group.advanced">Advanced</div>
          <button class="nav-button" data-view="runs">
            <span class="nav-icon" aria-hidden="true">◎</span>
            <span data-i18n="nav.runs">Runs</span>
          </button>
          <button class="nav-button" data-view="inbox">
            <span class="nav-icon" aria-hidden="true">▣</span>
            <span data-i18n="nav.inbox">Inbox</span>
            <span class="nav-count" id="inboxCount"></span>
          </button>
          <button class="nav-button" data-view="artifacts">
            <span class="nav-icon" aria-hidden="true">◇</span>
            <span data-i18n="nav.artifacts">Artifacts</span>
          </button>
          <button class="nav-button" data-view="agents">
            <span class="nav-icon" aria-hidden="true">∆</span>
            <span data-i18n="nav.agents">Agents</span>
          </button>
          <button class="nav-button" data-view="ops">
            <span class="nav-icon" aria-hidden="true">⌁</span>
            <span data-i18n="nav.ops">Ops</span>
          </button>
        </div>
        <div class="nav-group nav-settings-group">
          <button class="nav-button" data-view="settings">
            <span class="nav-icon" aria-hidden="true">⚙</span>
            <span data-i18n="nav.settings">Settings</span>
          </button>
        </div>
      </nav>
      <div class="sidebar-foot">
        <div class="runtime-card" id="runtimeCard">
          <div class="runtime-line">
            <span class="live-dot" id="runtimeDot" aria-hidden="true"></span>
            <strong id="runtimeStatus" data-i18n="shell.runtime.checking">Checking runtime…</strong>
          </div>
          <div class="runtime-line muted"><span id="runtimeDetail"></span></div>
        </div>
      </div>
    </aside>

    <button class="nav-backdrop" id="navBackdrop" data-i18n-label="nav.close" aria-label="Close navigation" tabindex="-1"></button>
    <main class="main">
      <header class="topbar">
        <button class="button nav-toggle" id="navToggle" aria-controls="sidebar" aria-expanded="false" data-i18n-label="nav.toggle" aria-label="Open navigation">☰</button>
        <div class="breadcrumb">
          <span data-i18n="shell.breadcrumb.root">Orbit</span>
          <span class="crumb-sep" aria-hidden="true">/</span>
          <h1 id="viewTitle">Runs</h1>
        </div>
        <button class="button" id="refresh" data-i18n="action.refresh">Refresh</button>
        <button class="button primary" id="newRun" data-i18n="action.newGoal" hidden>New goal</button>
        <select id="localeSelect" data-i18n-label="locale.switch" aria-label="Change language"></select>
        <button class="button" id="themeToggle" data-i18n-label="theme.toggle" aria-label="Toggle theme">◐</button>
      </header>
      <!-- Command outcomes are announced here rather than shown as a toast, so
           a screen reader hears the same result a sighted operator reads. -->
      <div id="liveRegion" class="banner info" role="status" aria-live="polite" hidden></div>
      <div id="content" class="content"></div>
    </main>
  </div>

  <script type="module" src="assets/app.js"></script>
</body>
</html>
