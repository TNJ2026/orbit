          edges: state.workflow.edges || [],
        })
      });
      state.workflow = {
        steps: data.steps || [],
        statuses: data.statuses || [],
        edges: data.edges || [],
        path: data.path || "",
        warnings: data.warnings || [],
      };
      renderWorkflow();
      await loadTasks();
    }

    // The step modal serves both adding a new step (the Add-step toolbar tool)
    // and editing an existing one (double-clicking a card).
    let wfStepModalMode = "add";
    let wfStepModalId = null;

    // Agent options for a step: installed CLI tools, plus an orphan entry if
    // the step names an agent that isn't
    // installed (legacy / hand-edited config) so it isn't silently dropped.
    // The step's Agent rows (one <select> each). Dispatches rotate across the
    // configured list independently for each step.
    // Each row is {agent, command}: the Agent select plus its own shell command
    // (blank = the Agent's built-in CLI).
    let stepAgentRows = [{ agent: "", command: "" }];

    // Only these steps round-robin across Agents (＋ button, up to 3). Every
    // other step — including any newly added one — takes a single Agent. Mirrors
    // the server's _MULTI_AGENT_STEP_IDS.
    const MULTI_AGENT_STEPS = new Set(["implement", "review", "test"]);
    function currentStepAllowsMultiAgent() {
      return wfStepModalMode === "edit" && MULTI_AGENT_STEPS.has(wfStepModalId);
    }

    // One row = an Agent dropdown (installed CLIs minus the agents already picked
    // in the other rows, plus the row's own value if it names an uninstalled/
    // legacy agent) over a per-Agent command input. A ＋ adds a row (up to 3); an
    // × removes one. The command input updates the model without re-rendering so
    // typing keeps focus; only the select and add/remove re-render.
    function renderAgentSelectors() {
      const installed = (state.tools || []).filter(tool => tool.installed);
      const multi = currentStepAllowsMultiAgent();
      if (!multi && stepAgentRows.length > 1) stepAgentRows = stepAgentRows.slice(0, 1);
      if (!stepAgentRows.length) stepAgentRows = [{ agent: "", command: "" }];
      const rows = stepAgentRows;
      const rowsHtml = rows.map((row, i) => {
        const val = row.agent;
        const chosen = new Set(rows.filter((r, j) => j !== i && r.agent).map(r => r.agent));
        const avail = installed.filter(tool => !chosen.has(tool.agent_name));
        const known = installed.some(tool => tool.agent_name === val);
        const opts = [`<option value="" ${val ? "" : "selected"}>${t("modal.addStep.agentDefault")}</option>`]
          .concat(avail.map(tool => {
            const label = tool.profile_name ? "Hermes" : tool.name;
            return `<option value="${escapeHtml(tool.agent_name)}" ${val === tool.agent_name ? "selected" : ""}>${escapeHtml(tool.agent_name)} — ${escapeHtml(label)}</option>`;
          }));
        if (val && !known) opts.push(`<option value="${escapeHtml(val)}" selected>${escapeHtml(val)} ${t("modal.addStep.agentMissing")}</option>`);
        const rm = rows.length > 1
          ? `<button type="button" class="step-agent-rm" data-i="${i}" title="${t("modal.addStep.agentRemove")}" style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:17px;line-height:1;padding:0 2px;">×</button>`
          : "";
        return `<div style="display:flex;flex-direction:column;gap:4px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <select class="step-agent-sel" data-i="${i}" style="flex:1;">${opts.join("")}</select>${rm}
          </div>
          <input type="text" class="step-agent-cmd" data-i="${i}" value="${escapeHtml(row.command || "")}" placeholder="${t("modal.addStep.agentCmdPh")}" style="width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;">
        </div>`;
      }).join("");
      $("addStepAgents").innerHTML = rowsHtml;
      document.querySelectorAll("#addStepAgents .step-agent-sel").forEach(sel => {
        sel.addEventListener("change", () => { stepAgentRows[+sel.dataset.i].agent = sel.value; renderAgentSelectors(); });
      });
      document.querySelectorAll("#addStepAgents .step-agent-cmd").forEach(inp => {
        inp.addEventListener("input", () => { stepAgentRows[+inp.dataset.i].command = inp.value; });
      });
      document.querySelectorAll("#addStepAgents .step-agent-rm").forEach(btn => {
        btn.addEventListener("click", () => {
          stepAgentRows.splice(+btn.dataset.i, 1);
          renderAgentSelectors();
        });
      });
      // The ＋ lives in the Agents title row (static markup). Only multi-agent
      // steps show it, and only below 3 rows.
      const addBtn = $("addStepAgentAdd");
      if (addBtn) addBtn.style.display = (multi && rows.length < 3) ? "" : "none";
    }

    function setStepAgents(agents, agentCommands) {
      const cap = currentStepAllowsMultiAgent() ? 3 : 1;
      const cmds = agentCommands || {};
      stepAgentRows = (agents || []).slice(0, cap).map(a => ({ agent: a, command: String(cmds[a] || "") }));
      if (!stepAgentRows.length) stepAgentRows = [{ agent: "", command: "" }];
      renderAgentSelectors();
    }

    function selectedStepAgents() {
      const out = [];
      for (const r of stepAgentRows) { if (r.agent && !out.includes(r.agent)) out.push(r.agent); }
      return out.slice(0, 3);
    }

    // {agent: command} for rows that name both an agent and a non-blank command.
    function selectedAgentCommands() {
      const map = {};
      for (const r of stepAgentRows) {
        const cmd = (r.command || "").trim();
        if (r.agent && cmd && !(r.agent in map)) map[r.agent] = cmd;
      }
      return map;
    }

    function openAddStepModal() {
      wfStepModalMode = "add";
      wfStepModalId = null;
      $("addStepModalTitle").textContent = t("modal.addStep.title");
      $("addStepConfirm").textContent = t("modal.addStep.add");
      $("addStepDelete").style.display = "none";
      $("addStepName").value = "";
      $("addStepName").placeholder = t("modal.addStep.namePh");
      $("addStepPrompt").value = "";
      $("addStepPrompt").placeholder = t("modal.addStep.promptPh");
      setStepAgents([]);
      $("addStepRequired").checked = false;
      $("addStepRequired").disabled = false;
      $("addStepModalBackdrop").classList.add("open");
      $("addStepName").focus();
    }

    function openEditStepModal(id) {
      const step = (state.workflow.steps || []).find(s => s.id === id);
      if (!step) return;
      wfStepModalMode = "edit";
      wfStepModalId = id;
      $("addStepModalTitle").textContent = t("modal.addStep.editTitle");
      $("addStepConfirm").textContent = t("modal.addStep.save");
      $("addStepDelete").style.display = step.required_locked ? "none" : "";
      $("addStepName").value = step.name || "";
      $("addStepPrompt").value = step.prompt || "";
      $("addStepPrompt").placeholder = t("modal.addStep.promptPh");
      setStepAgents(step.agents || [], step.agent_commands || {});
      $("addStepRequired").checked = !!step.required;
      $("addStepRequired").disabled = !!step.required_locked;
      $("addStepModalBackdrop").classList.add("open");
      $("addStepName").focus();
    }

    function closeAddStepModal() {
      $("addStepModalBackdrop").classList.remove("open");
    }

    function confirmStep() {
      if (wfStepModalMode === "edit") saveEditStep();
      else confirmAddStep();
    }

    async function confirmAddStep() {
      const name = ($("addStepName").value || "").trim() || t("wf.step");
      const agents = selectedStepAgents();
      const agent_commands = selectedAgentCommands();
      const required = $("addStepRequired").checked;
      const prompt = ($("addStepPrompt").value || "").trim();
      const steps = state.workflow.steps || [];
      // Seed coordinates only; saveWorkflow re-lays-out the graph with dagre.
      // Slugify the name into a stable step id (e.g. "Code Review" →
      // "code_review"); fall back to a timestamp suffix on collisions.
      let newId = name.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "") || "step";
      if (steps.some(s => s.id === newId)) newId = `${newId}_${Date.now().toString(36)}`;
      const newStep = { id: newId, name, agents, agent_commands, required, prompt, x: 40, y: 60 };
      state.workflow.steps = [...steps, newStep];
      closeAddStepModal();
      await run(async () => {
        await saveWorkflow();
        setStatus(t("wf.stepAdded", name));
      });
      const el = document.querySelector(`.workflow-node-wrap[data-id="${CSS.escape(newId)}"]`);
      if (el) el.scrollIntoView({ block: "center", inline: "center" });
    }

    async function saveEditStep() {
      const step = (state.workflow.steps || []).find(s => s.id === wfStepModalId);
      if (!step) { closeAddStepModal(); return; }
      step.name = ($("addStepName").value || "").trim() || step.name || t("wf.step");
      step.agents = selectedStepAgents();
      step.agent_commands = selectedAgentCommands();
      step.prompt = ($("addStepPrompt").value || "").trim();
      if (!step.required_locked) step.required = $("addStepRequired").checked;
      closeAddStepModal();
      await run(async () => {
        await saveWorkflow();
        setStatus(t("wf.stepSaved", step.name));
      });
    }

    function deleteStepFromModal() {
      const id = wfStepModalId;
      closeAddStepModal();
      if (id) removeWorkflowStep(id);  // guards required_locked + saves
    }

    async function removeWorkflowStep(id) {
      const step = (state.workflow.steps || []).find(s => s.id === id);
      if (step && step.required_locked) { setStatus(t("wf.coreNoRemove")); return; }
      state.workflow.steps = (state.workflow.steps || []).filter(s => s.id !== id);
      state.workflow.edges = (state.workflow.edges || []).filter(e => e.from !== id && e.to !== id);
      await run(async () => {
        await saveWorkflow();
        setStatus(t("wf.updated"));
      });
    }

    async function loadTasks() {
      if (!state.apiBase) {
        state.tasks = [];
        renderTasks();
        return;
      }
      const data = await api("/api/tasks?limit=200");
      state.tasks = data.tasks || [];
      renderTasks();
    }

    function taskBoardColumns(tasks) {
      const columns = {};
      const order = [];
      const add = (status, label) => {
        status = String(status || "").trim();
        if (!status || columns[status]) return;
        columns[status] = { name: label || stLabel(status), status, tasks: [] };
        order.push(status);
      };
      workflowStatusList().forEach(status => add(status.value, status.label));
      (state.workflow.steps || []).forEach(step => add(step.task_status, ""));
      tasks.forEach(task => add(task.task_status || "created", ""));
      if (!order.length) add("created", stLabel("created"));
      return order.map(status => columns[status]);
    }

    function currentBoardGoal() {
      const goals = state.goals || [];
      return goals.find(goal => !["closed", "accepted"].includes(goal.task_status))
        || goals[0]
        || null;
    }

    function goalWorkflowSteps() {
      return state.workflow.steps || [];
    }

    function goalWorkItems(goal) {
      return (state.tasks || []).filter(task =>
        !task.is_goal && task.parent_task_id === goal.id && !!task.source_message_id
      );
    }

    function stepCardsFor(parentId, stepId) {
      return (state.tasks || []).filter(task =>
        task.parent_task_id === parentId && !task.source_message_id
          && task.workflow_step === stepId
      );
    }

    function phaseInstances(goal, phase) {
      const phases = goalWorkflowSteps();
      const phaseIndex = phases.findIndex(item => item.id === phase.id);
      const decomposeIndex = phases.findIndex(item => item.decompose);
      const workItems = goalWorkItems(goal);
      // An explicit decomposition step separates the once-per-goal portion from
      // the per-work-item portion. Without one, instances belong to work items
      // when they exist; before that the goal's own cards remain visible.
      const perWorkItem = workItems.length > 0
        && (decomposeIndex < 0 || phaseIndex > decomposeIndex);
      const owners = perWorkItem ? workItems : [goal];
      return owners.map(owner => {
        const cards = owner.id === goal.id
          ? (goal.steps || []).filter(card => card.workflow_step === phase.id)
          : stepCardsFor(owner.id, phase.id);
        const card = cards[cards.length - 1] || null;
        let status = card ? (card.task_status || "assigned") : "waiting";
        if (!card && owner.id !== goal.id) {
          const laterCard = (state.tasks || []).some(candidate => {
            if (candidate.parent_task_id !== owner.id || candidate.source_message_id) return false;
            const candidateIndex = phases.findIndex(item => item.id === candidate.workflow_step);
            return candidateIndex > phaseIndex;
          });
          if (laterCard || owner.task_status === "closed") status = "skipped";
        }
        return { owner, card, status };
      });
    }

    function phaseSummary(instances) {
      const counts = { waiting: 0, assigned: 0, in_progress: 0, blocked: 0, closed: 0, skipped: 0 };
      instances.forEach(item => { counts[item.status] = (counts[item.status] || 0) + 1; });
      const total = instances.length;
      const settled = counts.closed + counts.skipped;
      const status = counts.blocked ? "blocked"
        : counts.in_progress ? "in_progress"
        : counts.assigned ? "assigned"
        : total && settled === total ? "closed"
        : settled ? "in_progress" : "waiting";
      return { counts, total, settled, status };
    }

    // Step-cell progress: work items × workflow steps form a grid; progress is
    // settled cells (closed/skipped) over total cells. When items interleave
    // across the pipeline (one at implement, one at review, one at test) this
    // reads as a smooth percentage, while "x/N done" stays the hard
    // landed-work metric. Rework reopens cells, so the percentage can honestly
    // go backwards.
    function goalStepProgress(goal) {
      const phases = goalWorkflowSteps();
      if (!phases.length) return null;
      let settled = 0, total = 0;
      phases.forEach(phase => {
        const summary = phaseSummary(phaseInstances(goal, phase));
        settled += summary.settled;
        total += summary.total;
      });
      if (!total) return null;
      return { settled, total, pct: Math.round(settled / total * 100) };
    }

    function goalFlowHtml(goal) {
      const phases = goalWorkflowSteps();
      if (!phases.length) return "";
      // Linear stepper: sort by the dagre-computed canvas x (then y) — the
      // canvas layout already ranks steps along the forward flow, so the x
      // order IS the flow order. No edges are drawn: rework simply turns a
      // step running again, and the full graph (branches, loop-back arcs)
      // lives on the Workflow page.
      const ordered = [...phases].sort((a, b) =>
        ((Number(a.x) || 0) - (Number(b.x) || 0))
        || ((Number(a.y) || 0) - (Number(b.y) || 0))
      );
      return `<div class="goal-flow" aria-label="${escapeHtml(t("tasks.workflow"))}">
        ${ordered.map((phase, index) => {
          const instances = phaseInstances(goal, phase);
          const summary = phaseSummary(instances);
          const status = summary.status;
          const tone = status === "closed" ? "done"
            : status === "blocked" ? "blocked"
            : ["in_progress", "assigned"].includes(status) ? "running" : "";
          const icon = status === "closed" ? "✓" : status === "blocked" ? "!"
            : status === "in_progress" ? "●" : "○";
          const statusLabel = status === "waiting" ? t("tasks.waiting") : stLabel(status);
          const oneInstance = instances.length === 1 ? instances[0] : null;
          const oneCard = oneInstance ? oneInstance.card : null;
          // A per-work-item phase with one instance represents that work item,
          // not its materialized workflow-step card. Open the task so the
          // drawer starts with its brief and complete step history. Goal-owned
          // phases still open their one step card as before.
          const detailTask = oneInstance && oneInstance.owner.id !== goal.id
            ? oneInstance.owner : oneCard;
          const action = detailTask
            ? ` onclick="showTaskDetails(${detailTask.id})" tabindex="0" role="button"`
            : ` onclick="showPhaseDetails('${phase.id}')" tabindex="0" role="button"`;
          const assignee = oneCard && oneCard.assignee ? ` · ${escapeHtml(oneCard.assignee)}` : "";
          const counts = summary.total > 1
            ? `<div class="meta goal-flow-step-counts">${escapeHtml(t("tasks.instanceProgress", summary.settled, summary.total))}${summary.counts.blocked ? ` · ⛔${summary.counts.blocked}` : ""}</div>` : "";
          const node = `<div class="goal-flow-step ${tone} actionable" data-id="${escapeHtml(phase.id)}"${action}>
            <div class="goal-flow-step-name">${icon} ${escapeHtml(phase.name || phase.id)}</div>
            <div class="meta">${escapeHtml(statusLabel)}${assignee}</div>
            ${counts}
          </div>`;
          return `${index ? '<div class="goal-flow-arrow" aria-hidden="true">→</div>' : ""}${node}`;
        }).join("")}
      </div>`;
    }

    function goalExecutionHtml(goal) {
      const total = goal.subtask_total || 0;
      const progress = total
        ? `${t("goal.done", goal.subtask_closed || 0, total)}${goal.subtask_blocked ? ` · ${t("goal.blocked", goal.subtask_blocked)}` : ""}`
        : t("tasks.awaitingTasks");
      const sp = goalStepProgress(goal);
      const stepChip = sp
        ? ` · <span title="${escapeHtml(t("goal.stepProgressTitle"))}">${t("goal.stepProgress", sp.pct)}</span>`
        : "";
      const historical = ["closed", "accepted"].includes(goal.task_status)
        ? `<span class="badge">${escapeHtml(t("tasks.noActiveGoal"))}</span>` : "";
      return `<div class="goal-execution">
        <div class="goal-execution-summary">
          <div style="min-width:0">
            <div class="goal-execution-title">🎯 #${goal.id} ${escapeHtml(goal.title || t("goal.fallback"))}</div>
            <div class="meta">${escapeHtml(stLabel(goal.task_status))} · ${escapeHtml(progress)}${stepChip}</div>
          </div>
          ${historical}
        </div>
        ${goalFlowHtml(goal)}
      </div>`;
    }

    // The 5s poll rebuilds #tasksList, which resets the goal-flow scroll. Keep
    // the user's position across re-renders and only auto-scroll to the current
    // step when it actually changes (goal or step id differs from last reveal).
    let goalFlowScrollLeft = null;
    let goalFlowRevealKey = "";

    function revealCurrentGoalStep(goalId) {
      const flow = document.querySelector("#tasksList .goal-flow");
      if (!flow) return;
      if (goalFlowScrollLeft !== null) flow.scrollLeft = goalFlowScrollLeft;
      const current = flow.querySelector(".goal-flow-step.blocked, .goal-flow-step.running");
      const key = goalId + ":" + (current ? current.dataset.id : "");
      if (current && key !== goalFlowRevealKey) {
        flow.scrollLeft = Math.max(0, current.offsetLeft - 32);
      }
      goalFlowRevealKey = key;
      goalFlowScrollLeft = flow.scrollLeft;
    }

    function renderTasks() {
      // The workflow is always the primary execution view. A Kanban appears
      // only when decomposition produced multiple independently tracked items.
      const goal = currentBoardGoal();
      // Capture the flow scroll before the rebuild wipes the DOM.
      const liveFlow = document.querySelector("#tasksList .goal-flow");
      if (liveFlow) goalFlowScrollLeft = liveFlow.scrollLeft;
      if (!goal) {
        $("tasksList").innerHTML = `<div class="empty" style="padding:40px">${t("tasks.noGoal")}</div>`;
        return;
      }
      const visibleTasks = goalWorkItems(goal);
      if (visibleTasks.length < 2) {
        const note = visibleTasks.length ? t("tasks.singleFlow") : t("tasks.awaitingTasks");
        $("tasksList").innerHTML = `${goalExecutionHtml(goal)}
          <div class="empty" style="padding:28px 16px">${escapeHtml(note)}</div>`;
        revealCurrentGoalStep(goal.id);
        return;
      }
      const columns = taskBoardColumns(visibleTasks);
      const byStatus = Object.fromEntries(columns.map(col => [col.status, col]));
      visibleTasks.forEach(task => {
        const status = task.task_status || "created";
        (byStatus[status] || columns[0]).tasks.push(task);
      });

      $("tasksList").innerHTML = `${goalExecutionHtml(goal)}
        <div class="tasks-section-label">${t("tasks.work")}</div>
        <div class="kanban-board">
          ${columns.map(col => `
            <div class="kanban-column">
              <div class="kanban-column-header">
                <span>${escapeHtml(col.name)}</span>
                <span class="badge">${col.tasks.length}</span>
              </div>
              <div class="kanban-cards">
                ${col.tasks.length ? col.tasks.map(task => `
                  <div class="kanban-card" onclick="showTaskDetails(${task.id})" tabindex="0" role="button" aria-label="${escapeHtml(t("tasks.title"))} #${escapeHtml(task.display_id || String(task.id))}">
                    <div class="kanban-card-title">#${escapeHtml(task.display_id || String(task.id))} ${escapeHtml(task.title || t("task.fallback"))}</div>
                    <div class="kanban-card-content">${escapeHtml(task.content)}</div>
                    ${task.workflow_step || task.parent_task_id || task.is_goal ? `<div class="meta" style="margin-bottom: 4px; display: flex; gap: 4px; flex-wrap: wrap;">
                      ${task.is_goal ? `<span class="badge wf-step-badge">${t("task.goal")}</span>` : ""}
                      ${task.parent_task_id ? `<span class="badge" title="${escapeHtml(t("task.subtaskTitle", task.parent_task_id))}">${t("task.subtask", task.parent_task_id)}</span>` : ""}
                      ${task.workflow_step ? `<span class="badge wf-step-badge">${t("task.step", escapeHtml(workflowStepName(task.workflow_step)))}</span>` : ""}
                      ${(task.depends_on && task.depends_on.length && !task.workflow_step) ? `<span class="badge" title="${escapeHtml(t("task.waitingTitle"))}" style="color: var(--warn); border-color: var(--warn);">${t("task.waiting", task.depends_on.map(id => "#" + id).join(" "))}</span>` : ""}
                    </div>` : ""}
                    <div class="kanban-card-meta">
                      <span>${escapeHtml(task.sender)} ➜ ${escapeHtml(task.recipient)}</span>
                    </div>
                  </div>
                `).join("") : `<div class="empty" style="text-align: center; padding: 20px 0;">${t("task.noTasks")}</div>`}
              </div>
            </div>
          `).join("")}
        </div>
      `;
      revealCurrentGoalStep(goal.id);

    }

    // The run viewer is single-subject: its runs are for whichever task is the
    // "runs subject" — the expanded step card if one is open, else the drawer's
    // own task. (For a task with step cards its own runs are empty; the real
    // runs live on the cards, so expanding a step retargets the viewer at it.)
    function runsSubjectId() {
      return state.expandedStepId || state.selectedTaskId;
    }

    async function toggleStep(cardId) {
      state.expandedStepId = state.expandedStepId === cardId ? null : cardId;
      await run(async () => {
        await loadTaskRuns(runsSubjectId());
      });
    }

    async function loadTaskRuns(taskId) {
      if (!state.apiBase || !taskId) {
        state.taskRuns = [];
        state.selectedRunId = null;
        state.selectedRunFileKey = "events";
        state.runFiles = {};
        return;
      }
      const data = await api(`/api/tasks/${taskId}/runs?limit=10`);
      state.taskRuns = data.runs || [];
      if (!state.taskRuns.find(run => run.id === state.selectedRunId)) {
        state.selectedRunId = (state.taskRuns[0] || {}).id || null;
      }
      if (state.selectedRunId) {
        await loadRunFile(state.selectedRunId, state.selectedRunFileKey || "events");
      } else {
        state.runFiles = {};
      }
      // Always re-render the drawer for its own task (parent), even when the
      // runs loaded above belong to an expanded step card.
      renderTaskDetails(state.tasks.find(t => t.id === state.selectedTaskId) || null);
    }

    async function rerunTask(taskId) {
      const select = $("rerunAgentSelect");
      const agent = select ? select.value : "";
      if (!agent) {
        setStatus(t("task.pickAgent"), true);
        return;
      }
      await run(async () => {
        const data = await api(`/api/tasks/${taskId}/rerun`, {
          method: "POST",
          body: JSON.stringify({ agent })
        });
        state.rerunAgent = null;  // consumed; next open defaults again
        setStatus(t("task.rerun", taskId, data.step, data.assignee, data.queued_job_id ? t("task.rerunQueued", data.queued_job_id) : ""));
        await loadTasks();
        await loadTaskRuns(taskId);
      });
    }

    async function reimplementTask(taskId) {
      const select = $("reimplementAgentSelect");
      const agent = select ? select.value : "";
      if (!agent) {
        setStatus(t("task.pickAgent"), true);
        return;
      }
      await run(async () => {
        const data = await api(`/api/tasks/${taskId}/reimplement`, {
          method: "POST",
          body: JSON.stringify({ agent })
        });
        state.rerunAgent = null;
        setStatus(t("task.reimplement", taskId, data.assignee, data.queued_job_id ? t("task.rerunQueued", data.queued_job_id) : ""));
        await loadTasks();
        await loadTaskRuns(taskId);
      });
    }

    async function loadRunFile(runId, fileKey) {
      const data = await api(`/api/task-runs/${runId}/files/${fileKey}?tail=65536`);
      state.selectedRunId = runId;
      state.selectedRunFileKey = fileKey;
      state.runFiles = { [fileKey]: data };
    }

    async function showRunFile(runId, fileKey) {
      await run(async () => {
        await loadRunFile(runId, fileKey);
        renderTaskDetails(state.tasks.find(t => t.id === state.selectedTaskId) || null);
      });
    }

    // One request: the server creates the goal task, flags it, and enters it
    // into the workflow atomically — no separate "start workflow" click.
    async function createGoal() {
      const goalVal = $("goalInput").value.trim();
      if (!goalVal) {
        setStatus(t("goal.enterFirst"), true);
        return;
      }
      const m = parseFloat($("goalBudget").value);
      const tokenBudget = (isFinite(m) && m > 0) ? Math.round(m * 1e6) : 0;
      const goalVerify = ($("goalVerify").value || "").trim();
      await run(async () => {
        const result = await api("/api/goals", {
          method: "POST",
          body: JSON.stringify({ content: goalVal, token_budget: tokenBudget, goal_verify: goalVerify })
        });
        $("goalInput").value = "";
        $("goalBudget").value = "";
        $("goalVerify").value = "";
        localStorage.removeItem("orbit-goal");
        await loadGoals();
        await loadTasks();
        const dispatchedTo = (result.dispatched || [])
          .map(d => `${d.step} → ${d.assignee}`).join(", ");
        setStatus(dispatchedTo
          ? t("goal.startedWith", result.goal.id, dispatchedTo)
          : t("goal.started", result.goal.id));
      });
    }

    async function loadGoals() {
      if (!state.apiBase) {
        state.goals = [];
        renderGoals();
        return;
      }
      const data = await api("/api/goals");
      state.goals = data.goals || [];
      renderGoals();
      renderTasksGoalBar();
      renderTasks();  // the current goal drives the single-goal execution board
    }

    async function resumeGoalBudget(goalId) {
      const input = $(`goalBudgetResume-${goalId}`);
      const millions = input ? Number(input.value) : NaN;
      if (!Number.isFinite(millions) || millions < 0) {
        setStatus(t("goal.budgetInvalid"), true);
        return;
      }
      await run(async () => {
        const data = await api(`/api/goals/${goalId}/resume-budget`, {
          method: "POST",
          body: JSON.stringify({ token_budget: Math.round(millions * 1e6) })
        });
        setStatus(t("goal.budgetResumed", goalId, data.step, data.assignee));
        await loadGoals();
        await loadTasks();
      });
    }

    function goalProgressHtml(goal) {
      const tokens = goal.tokens_total
        ? ` · <span class="meta" title="${escapeHtml(t("goal.tokensTitle"))}">🔢 ${goal.tokens_total.toLocaleString()} tokens</span>`
        : "";
      // token_budget is a raw token count (millions × 1e6 at creation); show it
      // back in millions. 0 = unlimited, so no chip.
      const budget = goal.token_budget
        ? ` · <span class="meta" title="${escapeHtml(t("goal.budgetChipTitle"))}">💰 ${t("goal.budgetChip", (goal.token_budget / 1e6).toLocaleString())}</span>`
        : "";
      const meta = tokens + budget;
      const sp = goalStepProgress(goal);
      const stepChip = sp
        ? ` · <span class="meta" title="${escapeHtml(t("goal.stepProgressTitle"))}">${t("goal.stepProgress", sp.pct)}</span>`
        : "";
      // Intake in flight: goal started, hub is splitting it, no subtask cards yet.
      const analyzing = !goal.subtask_total && goal.workflow_step
        && !["stalled", "closed", "accepted"].includes(goal.task_status);
      if (analyzing) {
        return `<span class="goal-analyzing"><span class="spinner"></span>${t("goal.analyzing")}${meta}</span>`;
      }
      if (!goal.subtask_total) {
        // A direct goal (no work items) still traverses the workflow: its
        // step-cell progress is the meaningful bar.
        if (sp) {
          return `
        <span class="meta">${t("goal.noSubtasks")}${stepChip}${meta}</span>
        <div class="goal-progress"><div class="goal-progress-fill" style="width: ${sp.pct}%"></div></div>`;
        }
        return `<span class="meta">${t("goal.noSubtasks")}${meta}</span>`;
      }
      // Bar tracks step-cell progress (smooth while items interleave across the
      // pipeline); the text keeps the hard landed-work count.
      const pct = Math.round(goal.subtask_closed / goal.subtask_total * 100);
      return `
        <span class="meta">${t("goal.done", goal.subtask_closed, goal.subtask_total)}${goal.subtask_blocked ? ` · <span style="color: var(--danger)">${t("goal.blocked", goal.subtask_blocked)}</span>` : ""}${stepChip}${meta}</span>
        <div class="goal-progress"><div class="goal-progress-fill" style="width: ${sp ? sp.pct : pct}%"></div></div>`;
    }

    function goalBudgetAlertHtml(goal) {
      if (!goal.budget_exceeded) return "";
      const minimum = Math.ceil(goal.tokens_total / 1e6);
      return `<div class="goal-budget-alert" role="alert">
        <strong>⚠ ${escapeHtml(t("goal.budgetExceeded", goal.tokens_total.toLocaleString(), goal.token_budget.toLocaleString(), goal.budget_overage.toLocaleString()))}</strong>
        <div class="row" style="gap: 6px; margin-top: 8px;">
          <label class="meta" for="goalBudgetResume-${goal.id}">${escapeHtml(t("goal.budgetResumeLabel"))}</label>
          <input id="goalBudgetResume-${goal.id}" type="number" min="0" step="1" value="${minimum}" style="width:90px;">
          <button type="button" class="primary" onclick="event.stopPropagation(); resumeGoalBudget(${goal.id})">${escapeHtml(t("goal.budgetResumeBtn"))}</button>
        </div>
      </div>`;
    }

    function workflowStepName(stepId, fallback) {
      const step = (state.workflow.steps || []).find(item => item.id === stepId);
      return (step && step.name) || fallback || stepId;
    }

    function goalStepsHtml(goal) {
      const steps = goal.steps || [];
      if (!steps.length) return "";
      return `
        <div class="goal-subtasks">
          <div class="meta" style="margin-bottom: 5px;">${t("goal.phases")}</div>
          ${steps.map(step => {
            const status = step.task_status || "assigned";
            const icon = status === "closed" ? "✓" : status === "blocked" ? "!" : "●";
            return `<div class="meta"><span aria-hidden="true">${icon}</span> ${escapeHtml(workflowStepName(step.workflow_step, step.title))} · ${escapeHtml(stLabel(status))}${step.assignee ? ` · ${escapeHtml(step.assignee)}` : ""}</div>`;
          }).join("")}
        </div>`;
    }

    function renderGoals() {
      const allGoals = state.goals || [];
      const hideClosed = $("hideClosedGoals") ? $("hideClosedGoals").checked : true;
      const goals = hideClosed ? allGoals.filter(goal => goal.task_status !== "closed") : allGoals;
      const hiddenCount = allGoals.length - goals.length;
      const hiddenNote = hiddenCount
        ? `<div class="meta" style="margin-top: 8px; padding-left: 12px;">${t("goal.closedHidden", hiddenCount, hiddenCount > 1 ? "s" : "")}</div>`
        : "";
      $("goalsList").innerHTML = (goals.length ? goals.map(goal => `
        <div class="goal-card" onclick="openGoalTask(${goal.id})" tabindex="0" role="button" aria-label="${escapeHtml(t("goal.fallback"))} #${goal.id}">
          <div class="row" style="justify-content: space-between;">
            <strong>🎯 #${goal.id} ${escapeHtml(goal.title || t("goal.fallback"))}</strong>
            <span class="row" style="gap: 6px; width: auto;">
              <span class="badge">${escapeHtml(stLabel(goal.task_status))}</span>
              ${goal.task_status === "accepted" ? `<button type="button" onclick="event.stopPropagation(); closeGoal(${goal.id})">${t("goal.close")}</button>` : ""}
              ${(goal.task_status !== "closed" && goal.task_status !== "accepted") ? `<button type="button" class="danger" onclick="event.stopPropagation(); forceCloseGoal(${goal.id})" title="${escapeHtml(t("goal.forceEndTitle"))}">${t("goal.forceEnd")}</button>` : ""}
            </span>
          </div>
          ${goal.workflow_step ? `<div class="meta">⚙ ${escapeHtml(workflowStepName(goal.workflow_step))} · ${escapeHtml(goal.assignee || "")}</div>` : ""}
          ${goalProgressHtml(goal)}
          ${goalBudgetAlertHtml(goal)}
          ${goalStepsHtml(goal)}
          ${goal.subtasks.length ? `
            <div class="goal-subtasks">
              ${goal.subtasks.map(sub => `
                <div class="meta goal-subtask-row" onclick="event.stopPropagation(); openGoalTask(${sub.id})" style="cursor: pointer;" tabindex="0" role="button" aria-label="#${sub.id} ${escapeHtml(sub.title || "")}">
                  #${sub.id} ${escapeHtml(sub.title || "")} — ${escapeHtml(stLabel(sub.task_status))}${sub.workflow_step ? ` · ⚙ ${escapeHtml(workflowStepName(sub.workflow_step))}` : ""}
                </div>
              `).join("")}
            </div>` : ""}
        </div>
      `).join("") : `<div class="empty">${allGoals.length && hideClosed
          ? t("goal.allClosed", allGoals.length, allGoals.length > 1 ? "s" : "", allGoals.length > 1 ? "are" : "is")
          : t("goal.noneYet")}</div>`) + hiddenNote;
    }

    function openGoalTask(taskId) {
      setPage("tasks");
      showTaskDetails(taskId);
    }

    async function closeGoal(goalId) {
      await run(async () => {
        await api(`/api/tasks/${goalId}/status`, {
          method: "POST",
          body: JSON.stringify({ task_status: "closed" })
        });
        await loadGoals();
        await loadTasks();
        setStatus(t("goal.closed", goalId));
      });
    }

    async function forceCloseGoal(goalId) {
      if (!confirm(t("goal.forceConfirm", goalId))) return;
      await run(async () => {
        const data = await api(`/api/tasks/${goalId}/force-close`, { method: "POST" });
        await loadGoals();
        await loadTasks();
        setStatus(t("goal.forceDone", goalId, data.closed_tasks, data.killed_runners));
      });
    }

    function renderTasksGoalBar() {
      const bar = $("tasksGoalBar");
      if (!bar) return;
      bar.innerHTML = `<span class="meta">${escapeHtml(t("tasks.workflow"))}</span>`;
    }

    function phaseStatusLabel(status) {
      if (status === "waiting") return t("tasks.waiting");
      if (status === "skipped") return t("tasks.skipped");
      return stLabel(status);
    }

    function showPhaseDetails(stepId) {
      const goal = currentBoardGoal();
      const phase = goalWorkflowSteps().find(item => item.id === stepId);
      if (!goal || !phase) return;
      const instances = phaseInstances(goal, phase);
      const summary = phaseSummary(instances);
      state.selectedTaskId = null;
      state.selectedPhaseId = stepId;
      state.expandedStepId = null;
      openTaskDrawer();
      $("taskDetails").classList.remove("empty");
      $("taskDetailContent").innerHTML = `
        <div class="task-detail-title">
          <span>${escapeHtml(phase.name || phase.id)}</span>
          <span class="badge">${escapeHtml(phaseStatusLabel(summary.status))}</span>
        </div>
        <div class="meta">${escapeHtml(t("tasks.phaseDetails"))} · ${escapeHtml(t("tasks.instances", summary.total))}</div>
        <div class="meta">${(phase.agents || []).length ? escapeHtml(phase.agents.join(" / ")) + " · " : ""}${phase.required ? "required" : "optional"}</div>
        <div class="phase-instance-list">
          ${instances.map(instance => {
            const card = instance.card;
            const owner = instance.owner;
            const label = owner.id === goal.id
              ? `🎯 #${goal.id} ${goal.title || t("goal.fallback")}`
              : `#${owner.display_id || owner.id} ${owner.title || t("task.fallback")}`;
            const click = card ? ` onclick="showTaskDetails(${card.id})" tabindex="0" role="button"` : "";
            return `<div class="phase-instance ${card ? "actionable" : ""}"${click}>
              <div style="min-width:0">
                <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(label)}</div>
                <div class="meta">${card && card.assignee ? escapeHtml(card.assignee) : escapeHtml(t("tasks.noInstance"))}</div>
              </div>
              <span class="badge">${escapeHtml(phaseStatusLabel(instance.status))}</span>
            </div>`;
          }).join("")}
        </div>`;
    }

    async function showTaskDetails(taskId) {
      let task = state.tasks.find(t => t.id === taskId);
      if (!task) {
        try {
          const res = await api(`/api/tasks/${taskId}`);
          task = res.task;
        } catch (e) {
          setStatus(t("task.loadFailed", taskId, e.message), true);
          return;
        }
      }
      if (!task) return;
      if (state.selectedTaskId !== taskId) {
        state.rerunAgent = null;       // reset picker per task
        state.expandedStepId = null;   // collapse any step expanded on the prior task
      }
      state.selectedTaskId = taskId;
      state.selectedPhaseId = null;
      openTaskDrawer();
      renderTaskDetails(task);
      run(async () => {
        await loadTaskRuns(runsSubjectId());
      });
    }

    function renderTaskDetails(task) {
      if (!task) {
        $("taskDetails").classList.add("empty");  // keep .open so the drawer stays put
        $("taskDetailContent").textContent = t("tasks.noSelected");
        return;
      }
      // Preserve the open run log's scroll position across the 5s poll re-render
      // so a background refresh doesn't jump the drawer back to the top.
      const prevScrolled = document.querySelector("#taskDetails .run-file-content");
      const prevScrollTop = prevScrolled ? prevScrolled.scrollTop : 0;
      $("taskDetails").classList.remove("empty");
      // Re-run agent picker. Default to an agent other than the one that just
      // failed; but keep the user's own choice across the 5s poll re-render
      // (state.rerunAgent), so a background refresh can't silently reset the
      // dropdown to the default before they click Re-run.
      const rerunAgents = (state.tools || []).map(tool => tool.agent_name);
      const defaultRerunAgent =
        (state.rerunAgent && rerunAgents.includes(state.rerunAgent))
          ? state.rerunAgent
          : (rerunAgents.find(name => name !== task.assignee) || rerunAgents[0] || "");
      // Only offer Re-run when something went wrong: the task is blocked, or its
      // latest run failed / was orphaned (killed). A healthy/running step hides it.
      const latestRun = (state.taskRuns || [])[0];
      const showRerun =
        task.task_status === "blocked" ||
        (latestRun && (latestRun.status === "failed" || latestRun.status === "orphaned"));
      const reworkLimited = task.task_status === "blocked" &&
        /^rework limit reached\b/i.test(task.blocked_reason || "");
      // Tasks that materialize step cards keep their runs on the cards, not the
      // task itself — those are surfaced per step above, so the bottom Runs list
      // (which would be empty or duplicate the expanded step) is suppressed.
      const hasStepCards = (state.tasks || [])
        .some(t => t.parent_task_id === task.id && !t.source_message_id);
      $("taskDetailContent").innerHTML = `
        <div class="task-detail-title">
          <span>${escapeHtml(task.title || t("task.fallbackId", task.id))}</span>
          <span class="badge">${escapeHtml(stLabel(task.task_status))}</span>
        </div>
        ${task.task_status === "blocked" ? `
          <div class="blocked-reason">
            <strong>${t("task.blockedReason")}</strong>
            <div class="blocked-reason-body">${escapeHtml(task.blocked_reason || t("task.noReason"))}</div>
          </div>` : ""}
        <div class="meta">
          #${escapeHtml(task.display_id || String(task.id))}${task.display_id ? ` ${t("task.id", task.id)}` : ""} ${escapeHtml(task.sender)} to ${escapeHtml(task.recipient)}
          ${task.created_at ? ` - ${fmtTime(task.created_at)}` : ""}
        </div>
        ${task.parent_task_id ? `
          <div class="meta">
            ${t("task.parent")} <a href="#" onclick="event.preventDefault(); showTaskDetails(${task.parent_task_id})">#${task.parent_task_id} ${escapeHtml(((state.tasks || []).find(t0 => t0.id === task.parent_task_id) || {}).title || "")}</a>
          </div>` : ""}
        ${task.is_goal ? `<div class="meta">${t("goal.isGoal").replace(t("goal.pageLink"), `<a href="#" onclick="event.preventDefault(); setPage('goals')">${t("goal.pageLink")}</a>`)}</div>` : ""}
        <div class="meta">
          ${t("task.importance", escapeHtml(task.importance || "normal"))}
          - ${t("task.size", escapeHtml(task.size || "medium"))}
          - ${t("task.risk", escapeHtml(task.risk || "medium"))}
          ${(task.required_capabilities || []).length ? ` - ${t("task.capabilities", escapeHtml(task.required_capabilities.join(", ")))}` : ""}
          ${task.exclusive_workspace ? ` - ${t("task.exclusive")}` : ""}
        </div>
        <div class="task-detail-body">${escapeHtml(task.content)}</div>
        ${task.step_inputs && Object.keys(task.step_inputs).length ? `
          <div class="structured-detail">
            <strong>${t("tasks.inputs")}</strong>
            ${task.step_inputs.task ? `<div class="structured-detail-body">${escapeHtml(task.step_inputs.task.content || task.step_inputs.task.title || "")}</div>` : ""}
            ${task.step_inputs.upstream_result ? `<div class="meta" style="margin-top:7px">${t("tasks.upstream")}</div><div class="structured-detail-body">${escapeHtml(task.step_inputs.upstream_result)}</div>` : ""}
          </div>` : ""}
        ${task.result_summary ? `
          <div class="structured-detail">
            <strong>${t("tasks.resultSummary")}</strong>
            <div class="structured-detail-body">${escapeHtml(task.result_summary)}</div>
          </div>` : ""}
        ${(task.artifacts || []).length ? `
          <div class="structured-detail">
            <strong>${t("tasks.artifacts")}</strong>
            <div class="artifact-list">${task.artifacts.map(item => `<code>${escapeHtml(item)}</code>`).join("")}</div>
          </div>` : ""}
        ${(() => {
          const cards = (state.tasks || [])
            .filter(t0 => t0.parent_task_id === task.id && !t0.source_message_id)
            .sort((a, b) => a.id - b.id);
          if (!cards.length) return "";
          return `
        <div class="task-runs">
          <div class="row" style="justify-content: space-between;">
            <strong>${t("task.steps")}</strong><span class="meta">${cards.length}</span>
          </div>
          <div class="step-list">
            ${cards.map(c => {
              const st = c.task_status || "";
              // A settled step card is 'closed'; 'accepted' means the accept
              // step is still in flight, so it renders active, not done.
              const cls = st === "closed" ? "done"
                        : st === "blocked" ? "blocked"
                        : "active";
              const expanded = c.id === state.expandedStepId;
              return `
              <div class="step-item step-${cls}${expanded ? " expanded" : ""}" onclick="toggleStep(${c.id})" tabindex="0" role="button" aria-expanded="${expanded ? "true" : "false"}" aria-label="${escapeHtml(c.workflow_step || c.title || t("wf.step"))}">
                <span class="step-dot"></span>
                <span class="step-name">${escapeHtml(c.workflow_step || c.title || "")}</span>
                ${c.assignee ? `<span class="step-agent">${escapeHtml(c.assignee)}</span>` : ""}
                <span class="step-id">#${escapeHtml(c.display_id || String(c.id))}</span>
                <span class="badge">${escapeHtml(stLabel(st))}</span>
                <span class="step-chevron">${expanded ? "⌃" : "⌄"}</span>
              </div>
              ${expanded ? `
              <div class="step-detail" onclick="event.stopPropagation()">
                <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 4px;">
                  <span class="meta">${t("task.runsFor", escapeHtml(c.workflow_step || c.title || ""))}</span>
                  <a href="#" class="step-open" onclick="event.preventDefault(); event.stopPropagation(); showTaskDetails(${c.id})">${t("task.open")}</a>
                </div>
                ${renderTaskRuns()}
              </div>` : ""}`;
            }).join("")}
          </div>
        </div>`;
        })()}
        <div class="task-runs">
          <div class="row" style="justify-content: space-between;">
            <strong>${t("task.runs")}</strong>
          </div>
          ${showRerun ? `
          ${reworkLimited ? `
          <div class="rerun-box">
            <strong>${t("task.reimplementTitle")}</strong>
            <div class="meta">${t("task.reimplementHint")}</div>
            <div class="row" style="gap: 6px; margin-top: 4px;">
              <select id="reimplementAgentSelect" onchange="state.rerunAgent = this.value">
                ${rerunAgents.length
                  ? rerunAgents.map(name => `<option value="${escapeHtml(name)}"${name === defaultRerunAgent ? " selected" : ""}>${escapeHtml(name)}</option>`).join("")
                  : `<option value="">${t("task.noAgents")}</option>`}
              </select>
              <button type="button" class="primary" onclick="reimplementTask(${task.id})">${t("task.reimplementBtn")}</button>
            </div>
          </div>` : ""}
          <div class="rerun-box">
            <div class="meta">${t("task.rerunHint")}</div>
            <div class="row" style="gap: 6px; margin-top: 4px;">
              <select id="rerunAgentSelect" onchange="state.rerunAgent = this.value">
                ${rerunAgents.length
                  ? rerunAgents.map(name => `<option value="${escapeHtml(name)}"${name === defaultRerunAgent ? " selected" : ""}>${escapeHtml(name)}</option>`).join("")
                  : `<option value="">${t("task.noAgents")}</option>`}
              </select>
              <button type="button" class="primary" onclick="rerunTask(${task.id})">${reworkLimited ? t("task.reviewBtn") : t("task.rerunBtn")}</button>
            </div>
          </div>` : ""}
          ${hasStepCards
            ? `<div class="meta">${t("task.runsPerStep")}</div>`
            : renderTaskRuns()}
        </div>
      `;
      const nowScrolled = document.querySelector("#taskDetails .run-file-content");
      if (nowScrolled && prevScrollTop) nowScrolled.scrollTop = prevScrollTop;
    }

    function formatRunFileContent(fileKey, content) {
      if (!content) return "";
      if (fileKey === "events") {
        try {
          const trimmed = content.trim();
          if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
            const parsed = JSON.parse(trimmed);
            return JSON.stringify(parsed, null, 2);
          }
        } catch (e) {
          // Not a single JSON document, fallback to JSON lines
        }
        
        const lines = content.split("\n");
        const formattedLines = lines.map(line => {
          const trimmedLine = line.trim();
          if (!trimmedLine) return "";
          try {
            const parsed = JSON.parse(trimmedLine);
            return JSON.stringify(parsed, null, 2);
          } catch (e) {
            return line;
          }
        }).filter(Boolean);
        
        if (formattedLines.length > 0) {
          return formattedLines.join("\n\n");
        }
      }
      return content;
    }

    function renderTaskRuns() {
      if (!state.taskRuns.length) {
        return `<div class="empty" style="padding: 0;">${t("task.noRuns")}</div>`;
      }
      const visibleFile = Object.values(state.runFiles)[0] || null;
      return state.taskRuns.map(run => `
        <div class="task-run ${run.id === state.selectedRunId ? "active" : ""}">
          <div class="row" style="justify-content: space-between;">
            <strong>run-${String(run.attempt).padStart(3, "0")}</strong>
            <span class="badge">${escapeHtml(run.status)}</span>
          </div>
          <div class="meta">
            ${escapeHtml(run.worker || t("task.unknownWorker"))}
            ${run.exit_code === null || run.exit_code === undefined ? "" : ` - ${t("task.exit", run.exit_code)}`}
            ${run.started_at ? ` - ${fmtTime(run.started_at)}` : ""}
          </div>
          <div class="meta">${escapeHtml(run.log_dir || "")}</div>
          <div class="run-files">
            ${["events", "prompt", "stdout", "stderr", "result"].map(fileKey => `
              <button type="button" ${run.id === state.selectedRunId && fileKey === state.selectedRunFileKey ? 'class="primary"' : ""} onclick="showRunFile(${run.id}, '${fileKey}')">${fileKey}</button>
            `).join("")}
          </div>
          ${run.id === state.selectedRunId && visibleFile ? `
            <pre class="run-file-content">${escapeHtml(formatRunFileContent(state.selectedRunFileKey, visibleFile.content || ""))}</pre>
          ` : ""}
        </div>
      `).join("");
    }

    async function run(action) {
      try {
        await action();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    // Per-page refresh: each button reloads its page's data plus whatever
    // that page's selects depend on, with a spinner while in flight.
    function wireRefresh(id, loader) {
      const button = $(id);
      button.classList.add("refresh-btn");
      button.addEventListener("click", async () => {
        if (button.disabled) return;
        button.disabled = true;
        button.classList.add("refreshing");
        const started = Date.now();
        try {
          await loader();
          setStatus(t("status.refreshed"));
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          // Keep the spinner visible long enough to register as feedback.
          const remaining = 400 - (Date.now() - started);
          if (remaining > 0) await new Promise(resolve => setTimeout(resolve, remaining));
          button.classList.remove("refreshing");
          button.disabled = false;
        }
      });
    }
    wireRefresh("refreshTools", async () => { await loadProjects(); await loadStatus(); await loadTools(); });
    wireRefresh("refreshWorkflow", async () => { await loadTasks(); await loadWorkflow(); });
    wireRefresh("refreshTasks", loadTasks);
    wireRefresh("refreshGoals", loadGoals);
    $("addStepCancel").addEventListener("click", closeAddStepModal);
    $("addStepConfirm").addEventListener("click", confirmStep);
    $("addStepDelete").addEventListener("click", deleteStepFromModal);
    $("addStepAgentAdd").addEventListener("click", () => {
      if (currentStepAllowsMultiAgent() && stepAgentRows.length < 3) {
        stepAgentRows.push({ agent: "", command: "" });
        renderAgentSelectors();
      }
    });
    $("addStepName").addEventListener("keydown", (e) => {
      if (e.key === "Enter") confirmStep();
      else if (e.key === "Escape") closeAddStepModal();
    });
    // Step modal only closes via its Cancel/Save/Delete buttons — clicking the
    // backdrop (outside the modal) must not dismiss it and lose unsaved edits.
    $("toggleTaskDetails").addEventListener("click", closeTaskDrawer);
    $("taskDetailsBackdrop").addEventListener("click", closeTaskDrawer);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && $("taskDetails").classList.contains("open")) closeTaskDrawer();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && wfTool && !$("addStepModalBackdrop").classList.contains("open")) {
        setWfTool("");
      }
    });
    $("toolsTab").addEventListener("click", () => setPage("tools"));
    $("settingsTab").addEventListener("click", () => setPage("settings"));
    $("saveSettings").addEventListener("click", saveSettings);
    $("workflowTab").addEventListener("click", () => setPage("workflow"));
    $("goalsTab").addEventListener("click", () => setPage("goals"));
    $("startGoal").addEventListener("click", createGoal);
    $("goalInput").addEventListener("input", () => {
      localStorage.setItem("orbit-goal", $("goalInput").value);
    });
    $("goalInput").value = localStorage.getItem("orbit-goal") || "";
    // Default to hiding closed goals so finished/abandoned goals don't pile up;
    // the choice persists across reloads.
    $("hideClosedGoals").checked = localStorage.getItem("orbit-hide-closed-goals") !== "false";
    $("hideClosedGoals").addEventListener("change", () => {
      localStorage.setItem("orbit-hide-closed-goals", $("hideClosedGoals").checked);
      renderGoals();
    });
    $("tasksTab").addEventListener("click", () => setPage("tasks"));

    // Keyboard activation for clickable cards/rows that opt in via
    // role="button" + tabindex="0" (kanban/goal/step cards, workflow nodes,
    // goal subtask rows). Enter or Space fires a click, matching native
    // button semantics — so the existing onclick handlers run unchanged.
    // Workflow nodes are special: Enter triggers the edit (double-click)
    // behavior unless the Connect tool is active, in which case it picks
    // the node like a single click (source → target).
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      // Let native interactive elements handle their own activation; only
      // intercept for div-based role="button" cards/rows.
      const tag = event.target.tagName;
      if (tag === "BUTTON" || tag === "A" || tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
      const el = event.target.closest('[role="button"]');
      if (!el) return;
      event.preventDefault();
      if (event.key === " " && el.classList.contains("workflow-node")) return; // Space makes no sense on a node
      if (el.classList.contains("workflow-node")) {
        const id = el.dataset.id;
        if (!id) return;
        // In connect mode, Enter picks the node (same as handleNodeClick);
        // otherwise it opens the edit modal (same as the dblclick handler).
        if (wfTool === "connect") handleConnectPick(id);
        else openEditStepModal(id);
        return;
      }
      el.click();
    });

    // Language switcher: persist + re-apply static labels + re-render dynamic
    // content so the whole UI swaps locale without a reload.
    {
      const sel = $("langSelect");
      sel.value = LANG;
      sel.addEventListener("change", () => setLang(sel.value));
    }
    applyStaticI18n();

    run(async () => {
      await refreshWorkspace();
      setStatus(t("status.ready"));
    });

    // Live board: agents create and move tasks on their own, so poll tasks
    // (and the open task's workflow state) instead of relying on manual
    // Refresh. Skipped while offline or when the tab is hidden.
    let livePolling = false;
    setInterval(async () => {
      if (livePolling || !state.apiBase || document.hidden) return;
      // Re-rendering the board or the drawer would steal focus mid-keystroke
      // (goal box, status selects, the drawer's Re-run dropdown); wait until the
      // user leaves both. #taskDetails is a sibling of #tasksList, so it needs
      // its own guard.
      const active = document.activeElement;
      if (active && ($("tasksList").contains(active) || $("taskDetails").contains(active))) return;
      livePolling = true;
      try {
        await loadTasks();
        if (state.selectedTaskId) {
          await loadTaskRuns(runsSubjectId());
        } else if (!state.selectedPhaseId) {
          renderTaskDetails(null);
        }
        // The workflow canvas is config-driven (not live task data), so the poll
        // must NOT re-render it: rebuilding #workflowSteps recreates the scroll
        // container and snaps the canvas back to the start mid-scroll. It already
        // re-renders on open / manual Refresh / save / edit.
        // Goals feed both the Goals page and the bar above the kanban.
        if ($("goalsPage").classList.contains("active") || $("tasksPage").classList.contains("active")) await loadGoals();
        if (state.selectedPhaseId) showPhaseDetails(state.selectedPhaseId);
      } catch (error) {
        // transient poll errors stay silent; manual actions still report
      } finally {
        livePolling = false;
      }
    }, 5000);
  </script>
</body>
</html>
