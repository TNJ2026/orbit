          </div>` : ""}
        ${task.is_goal ? `<div class="meta">🎯 this is a goal — subtask progress on the <a href="#" onclick="event.preventDefault(); setPage('goals')">Goals page</a></div>` : ""}
        <div class="meta">
          role: ${escapeHtml(task.role_required || "implementer")}
          - importance: ${escapeHtml(task.importance || "normal")}
          - size: ${escapeHtml(task.size || "medium")}
          - risk: ${escapeHtml(task.risk || "medium")}
          ${(task.required_capabilities || []).length ? ` - capabilities: ${escapeHtml(task.required_capabilities.join(", "))}` : ""}
          ${task.exclusive_workspace ? " - exclusive workspace" : ""}
        </div>
        <div class="task-detail-body">${escapeHtml(task.content)}</div>
        <div class="task-runs">
          <div class="row" style="justify-content: space-between;">
            <strong>Workflow</strong>
          </div>
          ${renderTaskWorkflow(task)}
        </div>
        <div class="task-runs">
          <div class="row" style="justify-content: space-between;">
            <strong>Assignment</strong>
            <button type="button" onclick="recommendAgent(${task.id})">Recommend Agent</button>
          </div>
          ${renderAssignmentCandidates()}
        </div>
        <div class="task-runs">
          <div class="row" style="justify-content: space-between;">
            <strong>Runs</strong>
            <button type="button" onclick="createTaskRun(${task.id})">New Run</button>
          </div>
          ${renderTaskRuns()}
        </div>
      `;
    }

    function renderTaskWorkflow(task) {
      const wf = state.taskWorkflow;
      if (!wf || wf.task_id !== task.id) {
        return `<div class="empty" style="padding: 0;">Loading workflow state…</div>`;
      }
      const active = wf.active_steps || [];
      const transitions = wf.transitions || [];
      if (!transitions.length) {
        if (task.task_status === "closed") {
          return `<div class="meta">Task closed; not routed through the workflow.</div>`;
        }
        return `<button class="primary" type="button" onclick="startTaskWorkflow(${task.id})">▶ Start Workflow</button>`;
      }
      let html = "";
      if (active.length) {
        html += `
          <div class="meta">active steps: ${active.map(escapeHtml).join(", ")}</div>
          <div class="row" style="flex-wrap: wrap; gap: 6px;">
            <select id="wfStepSel" style="width: auto;">${active.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("")}</select>
            <select id="wfOutcomeSel" style="width: auto;">
              <option value="done">done</option>
              <option value="rework">rework</option>
              <option value="blocked">blocked</option>
            </select>
            <input id="wfResultInput" placeholder="result / reason" style="flex: 1; min-width: 140px;">
            <button class="primary" type="button" onclick="completeTaskStep(${task.id})">Submit</button>
          </div>`;
      } else if (task.task_status === "closed") {
        html += `<div class="meta">Workflow finished — task closed.</div>`;
      } else if (task.task_status === "blocked") {
        html += `<div class="meta" style="color: var(--danger);">Blocked — no step is running; check the transition log.</div>`;
      }
      html += `<div class="wf-transitions">${transitions.slice(-15).reverse().map(t => `
        <div class="meta">
          ${t.created_at ? fmtTime(t.created_at) + " · " : ""}${escapeHtml(t.outcome)}:
          ${t.from_step ? escapeHtml(t.from_step) : "∅"}${t.to_step ? " → " + escapeHtml(t.to_step) : ""}
          (${escapeHtml(t.actor)})${t.note ? " — " + escapeHtml(t.note) : ""}
        </div>
      `).join("")}</div>`;
      return html;
    }

    async function loadTaskWorkflow(taskId) {
      try {
        state.taskWorkflow = await api(`/api/tasks/${taskId}/workflow`);
      } catch (error) {
        state.taskWorkflow = null;
      }
    }

    async function startTaskWorkflow(taskId) {
      await run(async () => {
        const data = await api(`/api/tasks/${taskId}/workflow/start`, {
          method: "POST",
          body: JSON.stringify({})
        });
        await loadTasks();
        await loadTaskWorkflow(taskId);
        renderTaskDetails(state.tasks.find(t => t.id === taskId) || null);
        const to = (data.dispatched || []).map(d => `${d.step} → ${d.assignee}`).join(", ");
        setStatus(to ? `Workflow started: ${to}` : "Workflow started");
      });
    }

    async function completeTaskStep(taskId) {
      const step = $("wfStepSel").value;
      const outcome = $("wfOutcomeSel").value;
      const result = $("wfResultInput").value.trim();
      await run(async () => {
        const data = await api(`/api/tasks/${taskId}/workflow/complete`, {
          method: "POST",
          body: JSON.stringify({ step, outcome, result })
        });
        await loadTasks();
        await loadTaskWorkflow(taskId);
        renderTaskDetails(state.tasks.find(t => t.id === taskId) || null);
        if (data.closed) setStatus(`Task #${taskId} closed`);
        else {
          const to = (data.dispatched || []).map(d => `${d.step} → ${d.assignee}`).join(", ");
          setStatus(to ? `Dispatched: ${to}` : `Step ${step}: ${outcome}`);
        }
      });
    }

    function renderAssignmentCandidates() {
      const data = state.assignmentCandidates;
      if (!data || data.task.id !== state.selectedTaskId) {
        return `<div class="empty" style="padding: 0;">No recommendation loaded.</div>`;
      }
      if (!data.candidates.length) {
        return `<div class="empty" style="padding: 0;">No matching enabled team member.</div>`;
      }
      return `
        <div class="meta">required expertise: L${escapeHtml(data.required_expertise_level || 3)}</div>
        ${data.required_followups && data.required_followups.length ? `
          <div class="meta">required follow-up roles: ${escapeHtml(data.required_followups.join(", "))}</div>
        ` : ""}
        ${data.candidates.slice(0, 5).map(candidate => `
          <div class="team-member" style="padding: 8px;">
            <div class="row" style="justify-content: space-between;">
              <strong>${escapeHtml(candidate.agent_name)}</strong>
              <span class="badge">score ${escapeHtml(candidate.score)}</span>
            </div>
            <div class="meta">
              expertise L${escapeHtml(candidate.expertise_level || 3)}
              - active ${escapeHtml(candidate.active_tasks)}
              - slots ${escapeHtml(candidate.available_slots)}
              ${candidate.expertise_gap ? ` - expertise gap ${escapeHtml(candidate.expertise_gap)}` : ""}
              ${candidate.missing_capabilities && candidate.missing_capabilities.length ? ` - missing ${escapeHtml(candidate.missing_capabilities.join(", "))}` : ""}
            </div>
          </div>
        `).join("")}
      `;
    }

    function renderTaskRuns() {
      if (!state.taskRuns.length) {
        return `<div class="empty" style="padding: 0;">No runs recorded.</div>`;
      }
      const visibleFile = Object.values(state.runFiles)[0] || null;
      return state.taskRuns.map(run => `
        <div class="task-run ${run.id === state.selectedRunId ? "active" : ""}">
          <div class="row" style="justify-content: space-between;">
            <strong>run-${String(run.attempt).padStart(3, "0")}</strong>
            <span class="badge">${escapeHtml(run.status)}</span>
          </div>
          <div class="meta">
            ${escapeHtml(run.worker || "unknown worker")}
            ${run.exit_code === null || run.exit_code === undefined ? "" : ` - exit ${run.exit_code}`}
            ${run.started_at ? ` - ${fmtTime(run.started_at)}` : ""}
          </div>
          <div class="meta">${escapeHtml(run.log_dir || "")}</div>
          <div class="run-files">
            ${["events", "stdout", "stderr", "result", "diff"].map(fileKey => `
              <button type="button" onclick="showRunFile(${run.id}, '${fileKey}')">${fileKey}</button>
            `).join("")}
          </div>
          ${run.id === state.selectedRunId && visibleFile ? `
            <pre class="run-file-content">${escapeHtml(visibleFile.content || "")}</pre>
          ` : ""}
        </div>
      `).join("");
    }

    async function run(action) {
      try {
        await action();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    // Per-page refresh: each button reloads its page's data plus whatever
    // that page's selects depend on, with a spinner while in flight.
    function wireRefresh(id, loader) {
      const button = $(id);
      button.classList.add("refresh-btn");
      button.addEventListener("click", async () => {
        if (button.disabled) return;
        button.disabled = true;
        button.classList.add("refreshing");
        const started = Date.now();
        try {
          await loader();
          setStatus("Refreshed");
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          // Keep the spinner visible long enough to register as feedback.
          const remaining = 400 - (Date.now() - started);
          if (remaining > 0) await new Promise(resolve => setTimeout(resolve, remaining));
          button.classList.remove("refreshing");
          button.disabled = false;
        }
      });
    }
    wireRefresh("refreshTools", async () => { await loadProjects(); await loadStatus(); await loadTools(); });
    wireRefresh("refreshTeam", async () => { await loadRoles(); await loadTools(); await loadTeam(); });
    wireRefresh("refreshWorkflow", async () => { await loadRoles(); await loadTasks(); await loadWorkflow(); });
    wireRefresh("refreshRoles", loadRoles);
    wireRefresh("refreshTasks", loadTasks);
    wireRefresh("refreshGoals", loadGoals);
    $("addTeamMember").addEventListener("click", addTeamMember);
    $("addWorkflowStep").addEventListener("click", addWorkflowStep);
    $("autoArrangeWorkflow").addEventListener("click", autoArrangeWorkflow);
    $("toggleTaskDetails").addEventListener("click", toggleTaskDetails);
    $("toolsTab").addEventListener("click", () => setPage("tools"));
    $("teamTab").addEventListener("click", () => setPage("team"));
    $("workflowTab").addEventListener("click", () => setPage("workflow"));
    $("rolesTab").addEventListener("click", () => setPage("roles"));
    $("goalsTab").addEventListener("click", () => setPage("goals"));
    $("startGoal").addEventListener("click", createGoal);
    $("goalInput").addEventListener("input", () => {
      localStorage.setItem("devloop-goal", $("goalInput").value);
    });
    $("goalInput").value = localStorage.getItem("devloop-goal") || "";
    $("tasksTab").addEventListener("click", () => setPage("tasks"));

    run(async () => {
      applyTaskDetailsCollapsed();
      await refreshWorkspace();
      setStatus("Ready");
    });

    // Live board: agents create and move tasks on their own, so poll tasks
    // (and the open task's workflow state) instead of relying on manual
    // Refresh. Skipped while offline or when the tab is hidden.
    let livePolling = false;
    setInterval(async () => {
      if (livePolling || !state.apiBase || document.hidden) return;
      // Re-rendering the board would steal focus mid-keystroke (goal box,
      // status selects); wait until the user leaves the tasks pane.
      const active = document.activeElement;
      if (active && ($("tasksList").contains(active) || $("taskDetails").contains(active))) return;
      livePolling = true;
      try {
        await loadTasks();
        if (state.selectedTaskId) {
          await loadTaskWorkflow(state.selectedTaskId);
          renderTaskDetails(state.tasks.find(t => t.id === state.selectedTaskId) || null);
        }
        if ($("workflowPage").classList.contains("active")) renderWorkflow();
        // Goals feed both the Goals page and the bar above the kanban.
        if ($("goalsPage").classList.contains("active") || $("tasksPage").classList.contains("active")) await loadGoals();
      } catch (error) {
        // transient poll errors stay silent; manual actions still report
      } finally {
        livePolling = false;
      }
    }, 5000);
  </script>
</body>
</html>
